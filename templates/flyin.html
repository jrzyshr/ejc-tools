<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EJC Fly-in</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@700;900&display=swap" rel="stylesheet">
<style>
  html, body, #cesiumContainer {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
  }
  /* Hide all Cesium UI chrome */
  .cesium-viewer-toolbar,
  .cesium-viewer-animationContainer,
  .cesium-viewer-timelineContainer,
  .cesium-viewer-fullscreenContainer,
  .cesium-viewer-vrContainer,
  .cesium-viewer-bottom,
  .cesium-credit-lightbox-overlay,
  .cesium-credit-expand-link {
    display: none !important;
  }

  /* ---- Text overlay shared styles ---- */
  /* font-family, font-weight, color set dynamically by setupOverlays() */
  .overlay-text {
    position: absolute;
    left: 0;
    width: 100%;
    text-align: center;
    pointer-events: none;
    z-index: 20;
    font-family: sans-serif;
    font-weight: 900;
    color: #FFFFFF;
    white-space: nowrap;
  }

  /* Overlay 1: "New Jersey Town #N" */
  #townNumberOverlay {
    top: 25%;
    transform: translateY(-50%);
    font-size: 160px;
    line-height: 1.1;
    padding: 0 40px;
    box-sizing: border-box;
  }

  /* Overlay 2: Town name + optional county/alias */
  #townNameOverlay {
    bottom: 25%;
    transform: translateY(50%);
    padding: 0 40px;
    box-sizing: border-box;
    opacity: 0;
  }

  #townNameOverlay .town-name-line {
    line-height: 1.1;
    /* font-size set dynamically by JS */
  }

  #townNameOverlay .county-line,
  #townNameOverlay .alias-line {
    line-height: 1.2;
    /* font-size set dynamically by JS (smaller than town name) */
  }

  /* EJC Logo — size and position set dynamically by setupOverlays() */
  #logoOverlay {
    position: absolute;
    z-index: 20;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<!-- Text Overlay 1: Town number (visible entire video) -->
<div id="townNumberOverlay" class="overlay-text" style="display:none;"></div>

<!-- Text Overlay 2: Town name + county/alias (appears when zoom completes) -->
<div id="townNameOverlay" class="overlay-text">
  <div class="town-name-line"></div>
  <div class="county-line"></div>
  <div class="alias-line"></div>
</div>

<!-- EJC Logo (visible from start, disappears when town name appears) -->
<img id="logoOverlay" src="" alt="" style="display:none;">

<script>
// ---- Configuration injected by Python ----
// These globals are set via page.evaluate() before startFlyIn() is called.
var FLYIN_CONFIG = {
  token: '',
  centroidLng: -74.0285,
  centroidLat: 40.7440,
  boundsWest: -74.0436,
  boundsSouth: 40.7367,
  boundsEast: -74.0098,
  boundsNorth: 40.7558,
  geojson: null,
  durationSeconds: 9,
  phasesPct: {
    globe_hold: [0, 11],
    globe_to_state: [11, 44],
    state_to_town: [44, 72],
    final_hold: [72, 100]
  },
  cameraStartAltitude: 20000000,
  cameraEndAltitudeOffset: 5000,
  cameraPitchDeg: -30,
  borderColor: '#FF0000',
  borderOpacity: 0.8,
  showBorder: true
};

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return {
    r: parseInt(hex.substring(0, 2), 16),
    g: parseInt(hex.substring(2, 4), 16),
    b: parseInt(hex.substring(4, 6), 16)
  };
}

function computeEndAltitude() {
  // Calculate camera altitude from bounding box to frame the town
  var lngSpan = FLYIN_CONFIG.boundsEast - FLYIN_CONFIG.boundsWest;
  var latSpan = FLYIN_CONFIG.boundsNorth - FLYIN_CONFIG.boundsSouth;
  // Use lat span scaled for 9:16 aspect ratio — the vertical FOV matters more
  // than the horizontal, so weight lat more heavily
  var effectiveSpan = Math.max(lngSpan * (16 / 9), latSpan);
  // Rough conversion: 1 degree ≈ 111km, then altitude ≈ span * factor
  // Factor tuned so the town fills ~90% of the frame with slim margin
  var spanMeters = effectiveSpan * 111000;
  var altitude = spanMeters * 0.9 + FLYIN_CONFIG.cameraEndAltitudeOffset;
  return Math.max(altitude, 2000); // minimum 2km
}

var viewer, borderEntity;

function initViewer() {
  // Destroy any previous viewer instance
  if (viewer) {
    try { viewer.destroy(); } catch(e) {}
    viewer = null;
    borderEntity = null;
  }

  Cesium.Ion.defaultAccessToken = FLYIN_CONFIG.token;

  viewer = new Cesium.Viewer('cesiumContainer', {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    baseLayer: Cesium.ImageryLayer.fromProviderAsync(
      Cesium.IonImageryProvider.fromAssetId(2) // Bing Maps Aerial
    ),
    animation: false,
    timeline: false,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    selectionIndicator: false,
    navigationHelpButton: false,
    infoBox: false,
    fullscreenButton: false,
    vrButton: false,
    creditContainer: document.createElement('div'), // hide credits
    skyBox: new Cesium.SkyBox({
      sources: {
        positiveX: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho2t3_80_px.jpg'),
        negativeX: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho2t3_80_mx.jpg'),
        positiveY: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho2t3_80_py.jpg'),
        negativeY: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho2t3_80_my.jpg'),
        positiveZ: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho2t3_80_pz.jpg'),
        negativeZ: Cesium.buildModuleUrl('Assets/Textures/SkyBox/tycho2t3_80_mz.jpg')
      }
    })
  });

  // Disable user interaction so the camera follows the scripted path only
  viewer.scene.screenSpaceCameraController.enableRotate = false;
  viewer.scene.screenSpaceCameraController.enableTranslate = false;
  viewer.scene.screenSpaceCameraController.enableZoom = false;
  viewer.scene.screenSpaceCameraController.enableTilt = false;
  viewer.scene.screenSpaceCameraController.enableLook = false;

  // Remove atmosphere haze for cleaner zoom
  viewer.scene.globe.showGroundAtmosphere = true;
  viewer.scene.skyAtmosphere.show = true;

  // Set initial camera directly above town centroid at globe altitude
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(
      FLYIN_CONFIG.centroidLng, FLYIN_CONFIG.centroidLat,
      FLYIN_CONFIG.cameraStartAltitude
    ),
    orientation: {
      heading: 0,
      pitch: Cesium.Math.toRadians(-90),
      roll: 0
    }
  });

  window._borderCreated = false;
}

function addBorderEntity(alpha) {
  // Store border data for canvas overlay rendering
  // (Cesium Entity polylines don't render reliably in headless Chrome)
  var geojson = FLYIN_CONFIG.geojson;
  window._borderAlpha = alpha;
  // Each entry: { exterior: [[lng,lat],...], holes: [[[lng,lat],...], ...] }
  window._borderPolygons = [];

  function closeRing(ring) {
    var coords = ring.map(function(c) { return [c[0], c[1]]; });
    var first = coords[0];
    var last = coords[coords.length - 1];
    if (first[0] !== last[0] || first[1] !== last[1]) {
      coords.push([first[0], first[1]]);
    }
    return coords;
  }

  function extractPolygon(rings) {
    // rings[0] = exterior ring, rings[1..n] = interior rings (holes)
    var poly = { exterior: closeRing(rings[0]), holes: [] };
    for (var i = 1; i < rings.length; i++) {
      poly.holes.push(closeRing(rings[i]));
    }
    window._borderPolygons.push(poly);
  }

  if (geojson.geometry.type === 'MultiPolygon') {
    geojson.geometry.coordinates.forEach(function(polygon) {
      extractPolygon(polygon);
    });
  } else {
    extractPolygon(geojson.geometry.coordinates);
  }

  // Create the overlay canvas
  if (!window._borderCanvas) {
    var canvas = document.createElement('canvas');
    canvas.id = 'borderOverlay';
    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;';
    canvas.width = 1080;
    canvas.height = 1920;
    document.body.appendChild(canvas);
    window._borderCanvas = canvas;
  }

  // Mark border entity as truthy for compatibility
  borderEntity = true;
  drawBorderOverlay();
}

function projectRing(ring) {
  var pts = [];
  ring.forEach(function(coord) {
    var cartesian = Cesium.Cartesian3.fromDegrees(coord[0], coord[1]);
    var screenPos = Cesium.SceneTransforms.worldToWindowCoordinates(viewer.scene, cartesian);
    if (screenPos) {
      pts.push(screenPos);
    }
  });
  return pts;
}

function ringBboxSpan(pts) {
  // Returns the max of width/height of the bounding box of projected points
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (var i = 0; i < pts.length; i++) {
    if (pts[i].x < minX) minX = pts[i].x;
    if (pts[i].x > maxX) maxX = pts[i].x;
    if (pts[i].y < minY) minY = pts[i].y;
    if (pts[i].y > maxY) maxY = pts[i].y;
  }
  return Math.max(maxX - minX, maxY - minY);
}

function traceRingPath(ctx, pts) {
  ctx.moveTo(pts[0].x, pts[0].y);
  for (var i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x, pts[i].y);
  }
  ctx.closePath();
}

function drawBorderOverlay() {
  var canvas = window._borderCanvas;
  if (!canvas || !window._borderPolygons) return;
  var ctx = canvas.getContext('2d');
  var alpha = window._borderAlpha || 0;
  var rgb = hexToRgb(FLYIN_CONFIG.borderColor);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (alpha <= 0) return;

  window._borderPolygons.forEach(function(poly) {
    var extPts = projectRing(poly.exterior);
    if (extPts.length < 3) return;

    // Skip drawing if projected shape is too small (< 5px span)
    if (ringBboxSpan(extPts) < 5) return;

    // Project hole rings
    var holePtsList = [];
    poly.holes.forEach(function(hole) {
      var pts = projectRing(hole);
      if (pts.length >= 3) holePtsList.push(pts);
    });

    // Fill exterior with holes cut out using evenodd rule
    ctx.beginPath();
    traceRingPath(ctx, extPts);
    holePtsList.forEach(function(holePts) {
      traceRingPath(ctx, holePts);
    });
    ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + (alpha * 0.15) + ')';
    ctx.fill('evenodd');

    // Stroke exterior outline
    ctx.beginPath();
    traceRingPath(ctx, extPts);
    ctx.strokeStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
    ctx.lineWidth = 10;
    ctx.stroke();

    // Stroke hole outlines
    holePtsList.forEach(function(holePts) {
      ctx.beginPath();
      traceRingPath(ctx, holePts);
      ctx.strokeStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
      ctx.lineWidth = 10;
      ctx.stroke();
    });
  });
}

function geojsonToPositions(geometry) {
  // Utility - not directly used for entity creation but kept for reference
  var coords;
  if (geometry.type === 'Polygon') {
    coords = geometry.coordinates[0];
  } else if (geometry.type === 'MultiPolygon') {
    coords = geometry.coordinates[0][0];
  } else {
    return [];
  }
  return Cesium.Cartesian3.fromDegreesArray(
    coords.reduce(function(arr, c) { arr.push(c[0], c[1]); return arr; }, [])
  );
}

function setBorderAlpha(alpha) {
  window._borderAlpha = alpha;
  drawBorderOverlay();
}

function waitForTiles() {
  return new Promise(function(resolve) {
    var checks = 0;
    var maxChecks = 300; // 30 seconds at 100ms intervals
    function check() {
      var tilesLoading = viewer.scene.globe.tilesLoaded;
      checks++;
      if (tilesLoading || checks >= maxChecks) {
        // Give a bit more time for textures to finish
        setTimeout(resolve, 500);
      } else {
        setTimeout(check, 100);
      }
    }
    check();
  });
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function startFlyIn() {
  var startTime = performance.now();
  function animate() {
    var elapsed = performance.now() - startTime;
    var done = applyAnimationFrame(elapsed);
    if (done) {
      window._flyInComplete = true;
      window.dispatchEvent(new Event('flyInComplete'));
      return;
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

/**
 * Position the camera and border for a specific elapsed time (in ms).
 * Used by Python for frame-by-frame capture. Returns a promise that
 * resolves after tiles are loaded (or a timeout).
 */
function setAnimationTime(elapsedMs) {
  applyAnimationFrame(elapsedMs);
  return new Promise(function(resolve) {
    var maxWait = 5000;
    var start = Date.now();
    function waitForTiles() {
      viewer.scene.render();
      if (viewer.scene.globe.tilesLoaded || Date.now() - start > maxWait) {
        resolve();
      } else {
        setTimeout(waitForTiles, 100);
      }
    }
    waitForTiles();
  });
}

/**
 * Core animation logic — positions camera and border for a given elapsed
 * time. Used by both startFlyIn() (real-time) and setAnimationTime()
 * (frame-by-frame). Returns true when the animation is complete.
 */
function applyAnimationFrame(elapsedMs) {
  var cfg = FLYIN_CONFIG;
  var duration = cfg.durationSeconds * 1000; // ms
  var endAlt = computeEndAltitude();
  var pitchRad = Cesium.Math.toRadians(-90);

  // Camera stays directly above town centroid — zoom is purely vertical
  var startAlt = cfg.cameraStartAltitude;
  var lng = cfg.centroidLng;
  var lat = cfg.centroidLat;

  var elapsed = Math.min(elapsedMs, duration);

  // Zoom occupies 0–75% of duration; border is always visible (zooms in naturally)
  var zoomEnd = 0.75;

  // Overall zoom progress (0..1)
  var zoomT = Math.min(elapsed / (duration * zoomEnd), 1.0);
  var easedT = easeInOutCubic(zoomT);

  // Altitude uses exponential interpolation for natural zoom feel
  // (linear interpolation of altitude looks like it stalls at high altitudes)
  var logStart = Math.log(startAlt);
  var logEnd = Math.log(endAlt);
  var alt = Math.exp(lerp(logStart, logEnd, easedT));

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(lng, lat, alt),
    orientation: { heading: 0, pitch: pitchRad, roll: 0 }
  });

  // Border is always visible — create on first frame, redraw every frame
  if (cfg.showBorder && cfg.geojson) {
    if (!window._borderCreated) {
      addBorderEntity(cfg.borderOpacity);
      window._borderCreated = true;
    } else {
      drawBorderOverlay();
    }
  }

  // Update overlay visibility based on zoom progress
  updateOverlays(zoomT);

  if (elapsed >= duration) {
    return true;
  }

  return false;
}

// Do NOT initialize viewer on load — wait for Python to inject
// the config with the Cesium Ion token first, then call initViewer().

// ---- Overlay setup and management ----

/**
 * Apply text outline and directional shadow effect using CSS text-shadow.
 * Shadow angle: 0°=right, 90°=down, 135°=bottom-left.
 */
function applyTextEffect(el, strokeW, outlineColor, shadowBlur, shadowDistance, shadowAngle) {
  var oc = outlineColor || '#000000';
  var s = strokeW;
  var outlineShadows = [
    s+'px 0 0 '+oc, (-s)+'px 0 0 '+oc, '0 '+s+'px 0 '+oc, '0 '+(-s)+'px 0 '+oc,
    s+'px '+s+'px 0 '+oc, (-s)+'px '+s+'px 0 '+oc, s+'px '+(-s)+'px 0 '+oc, (-s)+'px '+(-s)+'px 0 '+oc
  ];
  var shadows = outlineShadows.join(', ');
  var dist = shadowDistance != null ? shadowDistance : 10;
  var blur = shadowBlur || 0;
  if (dist > 0 || blur > 0) {
    var angleRad = ((shadowAngle != null ? shadowAngle : 135)) * Math.PI / 180;
    var sx = Math.round(Math.cos(angleRad) * dist);
    var sy = Math.round(Math.sin(angleRad) * dist);
    shadows += ', ' + sx + 'px ' + sy + 'px ' + blur + 'px rgba(0,0,0,0.8)';
  }
  el.style.textShadow = shadows;
}

/**
 * Measure text width at a given font size using an off-screen canvas.
 * Uses the configured font family and weight.
 */
function measureTextWidth(text, fontSize, fontWeight, fontFamily, fontStyle) {
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var style = fontStyle || 'normal';
  ctx.font = style + ' ' + fontWeight + ' ' + fontSize + 'px "' + fontFamily + '", sans-serif';
  return ctx.measureText(text).width;
}

/**
 * Auto-size text to fit within maxWidth, stepping down from startSize to minSize.
 * Returns the computed font size.
 */
function autoFitFontSize(text, startSize, minSize, maxWidth, fontWeight, fontFamily, fontStyle) {
  var fontSize = startSize;
  while (fontSize > minSize) {
    var w = measureTextWidth(text, fontSize, fontWeight, fontFamily, fontStyle);
    if (w <= maxWidth) break;
    fontSize -= 5;
  }
  return fontSize;
}

/**
 * Dynamically load Google Fonts for all font families used in the config.
 * Call before setupOverlays() so fonts are available for text measurement.
 */
function loadConfiguredFonts() {
  var cfg = FLYIN_CONFIG;
  var tn = cfg.overlayTownNumber || {};
  var tname = cfg.overlayTownName || {};
  var county = tname.county || {};
  var alias = tname.alias || {};
  var families = {};
  families[tn.fontFamily || 'Source Sans 3'] = true;
  families[tname.fontFamily || 'Source Sans 3'] = true;
  families[county.fontFamily || tname.fontFamily || 'Source Sans 3'] = true;
  families[alias.fontFamily || tname.fontFamily || 'Source Sans 3'] = true;
  Object.keys(families).forEach(function(family) {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=' +
      encodeURIComponent(family).replace(/%20/g, '+') +
      ':ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap';
    document.head.appendChild(link);
  });
}

/**
 * Set up overlay elements from FLYIN_CONFIG. Call after initViewer()
 * and loadConfiguredFonts().
 */
function setupOverlays() {
  var cfg = FLYIN_CONFIG;
  var tn = cfg.overlayTownNumber || {};
  var tname = cfg.overlayTownName || {};
  var county = tname.county || {};
  var alias = tname.alias || {};
  var maxWidth = 1000; // 1080 - 80px padding

  // ---- Overlay 1: Town number ----
  var numEl = document.getElementById('townNumberOverlay');
  numEl.style.top = (tn.topPct || 25) + '%';
  numEl.style.fontFamily = '"' + (tn.fontFamily || 'Source Sans 3') + '", sans-serif';
  numEl.style.fontWeight = tn.fontWeight || 900;
  numEl.style.fontStyle = tn.fontStyle || 'normal';
  numEl.style.color = tn.fontColor || '#FFFFFF';

  if (cfg.townNumber) {
    var numText = 'New Jersey Town #' + cfg.townNumber;
    numEl.textContent = numText;
    var numMaxSize = tn.fontSize || 160;
    var numFontSize = autoFitFontSize(numText, numMaxSize, 60, maxWidth,
                                       tn.fontWeight || 900, tn.fontFamily || 'Source Sans 3',
                                       tn.fontStyle || 'normal');
    numEl.style.fontSize = numFontSize + 'px';
    applyTextEffect(numEl, tn.outlineSize || 8, tn.outlineColor || '#000000',
                    tn.shadowBlur || 0, tn.shadowDistance != null ? tn.shadowDistance : 10,
                    tn.shadowAngle != null ? tn.shadowAngle : 135);
    numEl.style.display = 'block';
  } else {
    numEl.style.display = 'none';
  }

  // ---- Overlay 2: Town name ----
  var nameEl = document.getElementById('townNameOverlay');
  nameEl.style.bottom = (tname.bottomPct || 25) + '%';

  var nameLineEl = nameEl.querySelector('.town-name-line');
  var countyLineEl = nameEl.querySelector('.county-line');
  var aliasLineEl = nameEl.querySelector('.alias-line');

  // Town name line — own font settings
  nameLineEl.style.fontFamily = '"' + (tname.fontFamily || 'Source Sans 3') + '", sans-serif';
  nameLineEl.style.fontWeight = tname.fontWeight || 900;
  nameLineEl.style.fontStyle = tname.fontStyle || 'normal';
  nameLineEl.style.color = tname.fontColor || '#FFFFFF';

  // Build town name text (with optional type for disambiguation)
  var townText = cfg.townDisplayName || '';
  if (cfg.needType && cfg.typeName) {
    townText += ' ' + cfg.typeName;
  }
  nameLineEl.textContent = townText;

  // Dynamic font sizing for town name — auto-shrink to fit
  var maxSize = tname.fontSizeMax || 250;
  var minSize = tname.fontSizeMin || 100;
  var fontSize = autoFitFontSize(townText, maxSize, minSize, maxWidth,
                                  tname.fontWeight || 900, tname.fontFamily || 'Source Sans 3',
                                  tname.fontStyle || 'normal');
  nameLineEl.style.fontSize = fontSize + 'px';
  applyTextEffect(nameLineEl, tname.outlineSize || 8, tname.outlineColor || '#000000',
                  tname.shadowBlur || 0, tname.shadowDistance != null ? tname.shadowDistance : 10,
                  tname.shadowAngle != null ? tname.shadowAngle : 135);

  // County line — own font settings (resolved with inheritance by Python)
  if (cfg.needCounty && cfg.countyName) {
    var countyText = cfg.countyName + ' County';
    countyLineEl.textContent = countyText;
    countyLineEl.style.display = 'block';
    countyLineEl.style.fontFamily = '"' + (county.fontFamily || tname.fontFamily || 'Source Sans 3') + '", sans-serif';
    countyLineEl.style.fontWeight = county.fontWeight || tname.fontWeight || 900;
    countyLineEl.style.fontStyle = county.fontStyle || tname.fontStyle || 'normal';
    countyLineEl.style.color = county.fontColor || tname.fontColor || '#FFFFFF';

    var countyMaxSize = Math.round(fontSize * (county.fontSizeRatio || 0.65));
    var countyMinSize = Math.round(minSize * (county.fontSizeRatio || 0.65));
    var countyStrokeW = Math.round((tname.outlineSize || 8) * (county.outlineSizeRatio || 0.75));
    var countySize = autoFitFontSize(countyText, countyMaxSize, countyMinSize, maxWidth,
                                      county.fontWeight || tname.fontWeight || 900,
                                      county.fontFamily || tname.fontFamily || 'Source Sans 3',
                                      county.fontStyle || tname.fontStyle || 'normal');
    countyLineEl.style.fontSize = countySize + 'px';
    applyTextEffect(countyLineEl, countyStrokeW, county.outlineColor || tname.outlineColor || '#000000',
                    county.shadowBlur != null ? county.shadowBlur : (tname.shadowBlur || 0),
                    county.shadowDistance != null ? county.shadowDistance : (tname.shadowDistance != null ? tname.shadowDistance : 10),
                    county.shadowAngle != null ? county.shadowAngle : (tname.shadowAngle != null ? tname.shadowAngle : 135));
  } else {
    countyLineEl.textContent = '';
    countyLineEl.style.display = 'none';
  }

  // Alias line — own font settings (resolved with inheritance by Python)
  if (cfg.aliasName) {
    var aliasText = '(aka ' + cfg.aliasName + ')';
    aliasLineEl.textContent = aliasText;
    aliasLineEl.style.display = 'block';
    aliasLineEl.style.fontFamily = '"' + (alias.fontFamily || tname.fontFamily || 'Source Sans 3') + '", sans-serif';
    aliasLineEl.style.fontWeight = alias.fontWeight || tname.fontWeight || 900;
    aliasLineEl.style.fontStyle = alias.fontStyle || tname.fontStyle || 'normal';
    aliasLineEl.style.color = alias.fontColor || tname.fontColor || '#FFFFFF';

    var aliasMaxSize = Math.round(fontSize * (alias.fontSizeRatio || 0.65));
    var aliasMinSize = Math.round(minSize * (alias.fontSizeRatio || 0.65));
    var aliasStrokeW = Math.round((tname.outlineSize || 8) * (alias.outlineSizeRatio || 0.75));
    var aliasSize = autoFitFontSize(aliasText, aliasMaxSize, aliasMinSize, maxWidth,
                                    alias.fontWeight || tname.fontWeight || 900,
                                    alias.fontFamily || tname.fontFamily || 'Source Sans 3',
                                    alias.fontStyle || tname.fontStyle || 'normal');
    aliasLineEl.style.fontSize = aliasSize + 'px';
    applyTextEffect(aliasLineEl, aliasStrokeW, alias.outlineColor || tname.outlineColor || '#000000',
                    alias.shadowBlur != null ? alias.shadowBlur : (tname.shadowBlur || 0),
                    alias.shadowDistance != null ? alias.shadowDistance : (tname.shadowDistance != null ? tname.shadowDistance : 10),
                    alias.shadowAngle != null ? alias.shadowAngle : (tname.shadowAngle != null ? tname.shadowAngle : 135));
  } else {
    aliasLineEl.textContent = '';
    aliasLineEl.style.display = 'none';
  }

  // Start hidden — shown when zoom completes
  nameEl.style.opacity = '0';

  // ---- Logo ----
  var logoEl = document.getElementById('logoOverlay');
  if (cfg.logoDataUri) {
    logoEl.src = cfg.logoDataUri;
    var logoSize = cfg.overlayLogoSize || 600;
    logoEl.style.width = logoSize + 'px';
    logoEl.style.height = logoSize + 'px';
    logoEl.style.bottom = (cfg.overlayLogoBottom != null ? cfg.overlayLogoBottom : 40) + 'px';
    logoEl.style.right = (cfg.overlayLogoRight != null ? cfg.overlayLogoRight : 40) + 'px';
    logoEl.style.display = 'block';
  } else {
    logoEl.style.display = 'none';
  }

  window._overlaysReady = true;
}

/**
 * Update overlay visibility based on animation progress.
 * Called from applyAnimationFrame().
 */
function updateOverlays(zoomT) {
  if (!window._overlaysReady) return;

  var nameEl = document.getElementById('townNameOverlay');
  var logoEl = document.getElementById('logoOverlay');

  if (zoomT >= 1.0) {
    // Zoom complete: show town name, hide logo
    nameEl.style.opacity = '1';
    if (logoEl) logoEl.style.display = 'none';
  } else {
    // During zoom: hide town name, show logo
    nameEl.style.opacity = '0';
    if (logoEl && FLYIN_CONFIG.logoDataUri) logoEl.style.display = 'block';
  }
}

// Signal that the page is ready for Playwright
window._viewerReady = true;
</script>
